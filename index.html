<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Automation</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">BA</div>
          <div>
            <h1>Button Automation</h1>
            <p id="target-status">Google 대상 웹뷰를 준비 중입니다.</p>
          </div>
        </div>
        <div class="run-state" id="run-state">대기</div>
      </header>

      <main class="layout">
        <section class="workspace">
          <form class="target-form" id="target-form">
            <label for="target-url">대상 URL</label>
            <div class="url-row">
              <input
                id="target-url"
                name="target-url"
                type="url"
                autocomplete="off"
                placeholder="https://www.google.com"
                value="https://www.google.com"
              />
              <button type="submit" class="primary">열기</button>
            </div>
          </form>

          <div class="toolbar" aria-label="automation controls">
            <button id="inspect-btn" type="button">인스펙터</button>
            <button id="start-btn" type="button" class="primary">시작</button>
            <button id="stop-btn" type="button">정지</button>
            <button id="click-once-btn" type="button">1회 클릭</button>
            <label class="interval-control" for="interval-ms">
              <span>주기</span>
              <input id="interval-ms" type="number" min="500" step="500" value="5000" />
              <span>ms</span>
            </label>
          </div>

          <div class="selected-panel">
            <span class="panel-label">선택된 버튼</span>
            <strong id="selected-name">없음</strong>
            <code id="selected-selector">인스펙터로 대상 버튼을 선택하세요.</code>
          </div>

          <section class="preview-shell">
            <div class="preview-header">
              <div>
                <h2>라이브 미러</h2>
                <p id="snapshot-meta">아직 동기화된 화면이 없습니다.</p>
              </div>
              <button id="refresh-btn" type="button">새로고침</button>
            </div>
            <div id="preview" class="preview" aria-live="polite">
              <div class="empty-preview">대상 웹뷰에서 화면을 가져오는 중입니다.</div>
            </div>
          </section>
        </section>

        <aside class="log-panel">
          <div class="log-header">
            <div>
              <h2>로그</h2>
              <p id="log-count">0개 이벤트</p>
            </div>
            <button id="clear-logs-btn" type="button">지우기</button>
          </div>
          <ol id="logs" class="logs"></ol>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
